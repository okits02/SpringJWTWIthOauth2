services:
  db:
    image: mysql:8.4.9
    restart: always
    environment:
      - MYSQL_DATABASE=${MYSQL_DATABASE:-idetity_db}
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD:-123456}
    ports:
      - "${MYSQL_HOST_PORT:-3307}:3306"
    volumes:
      - ./init:/docker-entrypoint-initdb.d
      - db-data:/var/lib/mysql
    networks:
      identity-db:

  redis:
    image: redis:7-alpine
    container_name: redis
    restart: always
    ports:
      - "${SPRING_DATA_REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    networks:
      redis:

  identity-service:
    image: okits02/identity-service:latest
    container_name: identity-service
    env_file:
      - .env
    ports:
      - "8081:8080"
    depends_on:
      - mysql
      - redis
    networks:
      - identity-network
    restart: unless-stopped

volumes:
  redis_data:
  db-data:
networks:
  identity-db:
  redis:
